<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NGAJI DIGITAL 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #011a14; color: #f0fdf4; margin: 0; padding: 0; }
    .font-quran { font-family: 'Amiri', serif; }
    .glass { background: rgba(6, 78, 59, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(16, 185, 129, 0.1); }
    .btn-active:active { transform: scale(0.95); transition: 0.1s; }
  </style>
</head>
<body class="pb-32">

  <header class="p-6 sticky top-0 z-50 glass flex justify-between items-center border-b border-white/5">
    <div>
      <h1 class="text-xl font-black text-emerald-400 leading-none">NGAJI DIGITAL</h1>
      <p id="cityLabel" class="text-[9px] font-bold opacity-40 uppercase tracking-widest mt-1">📍 Memuat lokasi...</p>
    </div>
    <button onclick="toggleModal('cityModal')" class="bg-emerald-500 text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase btn-active shadow-lg shadow-emerald-500/20">Ganti Kota</button>
  </header>

  <main id="appContent" class="p-5 max-w-xl mx-auto space-y-6">
    <div class="py-20 text-center opacity-20 font-black animate-pulse uppercase tracking-widest">
      Menyiapkan Berkah...
    </div>
  </main>

  <div id="cityModal" class="fixed inset-0 z-[60] bg-black/95 backdrop-blur-md p-8 hidden">
    <div class="flex justify-between items-center mb-8">
      <h3 class="font-black text-emerald-400 uppercase text-xl">Pencarian Kota</h3>
      <button onclick="toggleModal('cityModal')" class="text-red-400 font-bold uppercase text-xs">Tutup</button>
    </div>
    <div class="flex gap-2 mb-6">
      <input type="text" id="cityInput" class="flex-1 bg-emerald-900/30 p-5 rounded-2xl outline-none border border-white/5 text-white" placeholder="Ketik nama kota...">
      <button onclick="searchCity()" class="bg-emerald-500 text-black px-8 font-black rounded-2xl">CARI</button>
    </div>
    <div id="cityResult" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
  </div>

  <nav class="fixed bottom-0 inset-x-0 glass p-5 flex justify-around items-center z-50 rounded-t-[2.5rem] border-t border-white/5">
    <button onclick="renderHome()" class="p-2"><span class="text-2xl">🏠</span></button>
    <button onclick="loadQuran()" class="p-2"><span class="text-2xl">📖</span></button>
    <button onclick="loadDoa()" class="p-2"><span class="text-2xl">📿</span></button>
    <button onclick="loadTahlil()" class="p-2"><span class="text-2xl">🕯️</span></button>
  </nav>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbwUr-Thm-lKknvmM3cYdCUl8781tG6dYULzriv7d30wSlgpllNWX2kdjQYSzI6m1cpv/exec";

    function toggleModal(id) { 
      const el = document.getElementById(id);
      if(el) el.classList.toggle('hidden'); 
    }

    function renderHome() {
      const content = document.getElementById('appContent');
      if (!content) return;

      const city = localStorage.getItem('m_city_name') || "JAKARTA";
      const cid = localStorage.getItem('m_city_id') || 1301;

      // Render Struktur Dulu agar tidak "Blank"
      content.innerHTML = `
        <div class="p-8 rounded-[3rem] bg-gradient-to-br from-emerald-800 to-emerald-950 shadow-2xl relative border border-white/5 overflow-hidden">
          <div class="mb-4 space-y-0.5 relative z-10">
            <p id="dateMasehi" class="text-[10px] font-black text-emerald-400 uppercase tracking-widest">Memuat tanggal...</p>
            <p id="dateHijri" class="text-[14px] font-bold text-white/40 font-quran italic">-- -- ----</p>
          </div>
          <h2 id="digitalClock" class="text-7xl font-black tracking-tighter mb-2 relative z-10">00:00</h2>
          <p class="text-[10px] font-black text-emerald-400 bg-emerald-400/10 inline-block px-3 py-1 rounded-full uppercase tracking-widest mb-8 relative z-10">📍 ${city}</p>
          <div class="grid grid-cols-3 gap-3 relative z-10">
            ${['Imsak','Subuh','Dzuhur','Ashar','Maghrib','Isya'].map(s => `
              <div class="text-center p-3 bg-black/20 rounded-2xl border border-white/5">
                <p class="text-[8px] font-black uppercase opacity-40 mb-1">${s}</p>
                <p id="val-${s.toLowerCase()}" class="text-sm font-black tracking-tight">--:--</p>
              </div>`).join('')}
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div onclick="loadQuran()" class="glass p-8 rounded-[2.5rem] text-center btn-active cursor-pointer">
            <span class="text-3xl">📖</span><p class="text-[9px] font-black mt-3 uppercase opacity-50">Al-Quran</p>
          </div>
          <div onclick="fullSync()" id="syncBtn" class="glass p-8 rounded-[2.5rem] text-center border-emerald-500/20 btn-active cursor-pointer">
            <span class="text-3xl">🔄</span><p class="text-[9px] font-black mt-3 uppercase opacity-50">Sync Data</p>
          </div>
        </div>
      `;

      updateClock();
      fetchCalendarAndSholat(cid, city);
    }

    function updateClock() {
      const el = document.getElementById('digitalClock');
      if (el) {
        el.innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', hour12:false}).replace('.', ':');
        setTimeout(updateClock, 1000);
      }
    }

    async function fetchCalendarAndSholat(id, name) {
      document.getElementById('cityLabel').innerText = "📍 " + name;
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth() + 1;
      const d = now.getDate();

      try {
        // Ambil Data Kalender dari myQuran API
        const resCal = await fetch(`https://api.myquran.com/v2/cal/hijri/${y}/${m}/${d}`);
        const dataCal = await resCal.json();
        
        if(dataCal.status && dataCal.data) {
          const c = dataCal.data;
          document.getElementById('dateMasehi').innerText = `${c.date[1].day}, ${c.date[1].date} ${c.date[1].month} ${c.date[1].year}`;
          document.getElementById('dateHijri').innerText = `${c.date[0].date} ${c.date[0].month} ${c.date[0].year} H`;
        }

        // Ambil Jadwal Sholat dari Backend GAS Anda
        const resSholat = await fetch(`${API}?action=getSholat&id=${id}`);
        const dataSholat = await resSholat.json();
        if (dataSholat && dataSholat.data && dataSholat.data.jadwal) {
          const j = dataSholat.data.jadwal;
          ['imsak','subuh','dzuhur','ashar','maghrib','isya'].forEach(k => {
            const el = document.getElementById('val-' + k);
            if (el) el.innerText = j[k];
          });
        }
      } catch (e) { 
        console.error("Gagal memuat data API:", e);
        document.getElementById('dateMasehi').innerText = "Koneksi Bermasalah";
      }
    }

    async function fullSync() {
      const btn = document.getElementById('syncBtn');
      if(btn) btn.classList.add('animate-pulse');
      try {
        const res = await fetch(`${API}?action=sync`);
        const d = await res.json();
        alert(d.message);
      } catch (e) { alert("Sync Gagal!"); }
      if(btn) btn.classList.remove('animate-pulse');
      renderHome();
    }

    async function loadQuran() {
      document.getElementById('appContent').innerHTML = '<div class="py-20 text-center animate-pulse uppercase opacity-30 font-black">Membuka Mushaf...</div>';
      try {
        const res = await fetch(`${API}?action=getSurah`);
        const data = await res.json();
        document.getElementById('appContent').innerHTML = data.map(s => `
          <div onclick="openSurah(${s.ID}, '${s.Nama}')" class="glass p-5 rounded-3xl flex justify-between items-center mb-2 btn-active cursor-pointer">
            <div class="flex items-center gap-4">
              <span class="w-8 h-8 bg-emerald-500 text-black flex items-center justify-center rounded-lg font-black text-xs">${s.ID}</span>
              <p class="font-bold text-sm uppercase">${s.Nama}</p>
            </div>
            <span class="font-quran text-lg opacity-30">${s["Nama Arab"]}</span>
          </div>`).join('');
      } catch(e) { alert("Data Kosong."); renderHome(); }
    }

    async function loadDoa() {
      document.getElementById('appContent').innerHTML = '<div class="py-20 text-center animate-pulse uppercase opacity-30 font-black">Memuat Doa...</div>';
      const res = await fetch(`${API}?action=getDoa`);
      const data = await res.json();
      document.getElementById('appContent').innerHTML = data.map(d => `
        <div class="glass p-8 rounded-[2.5rem] mb-4">
          <h4 class="text-[10px] font-black text-emerald-400 mb-6 uppercase border-b border-white/5 pb-4">${d.Judul}</h4>
          <div class="font-quran text-right mb-8 text-emerald-50 text-2xl" style="direction:rtl">${d.Arab}</div>
          <p class="text-xs opacity-50 italic">${d.Terjemah}</p>
        </div>`).join('');
    }

    async function loadTahlil() {
      document.getElementById('appContent').innerHTML = '<div class="py-20 text-center animate-pulse uppercase opacity-30 font-black">Memuat Tahlil...</div>';
      const res = await fetch(`${API}?action=getTahlil`);
      const data = await res.json();
      document.getElementById('appContent').innerHTML = data.map(t => `
        <div class="glass p-8 rounded-[2.5rem] mb-4">
          <h4 class="text-[10px] font-black text-emerald-400 mb-6 uppercase">${t.Judul}</h4>
          <div class="font-quran text-right mb-8 text-emerald-50 text-2xl" style="direction:rtl">${t.Arab}</div>
          <p class="text-xs opacity-50 italic">${t.Terjemah}</p>
        </div>`).join('');
    }

    async function searchCity() {
      const q = document.getElementById('cityInput').value;
      if(!q) return;
      const res = await fetch(`${API}?action=searchKota&q=${q}`);
      const d = await res.json();
      document.getElementById('cityResult').innerHTML = d.data.map(c => `
        <div onclick="setCity('${c.id}', '${c.lokasi}')" class="p-4 glass rounded-xl font-bold cursor-pointer uppercase text-xs btn-active">📍 ${c.lokasi}</div>
      `).join('');
    }

    function setCity(id, name) {
      localStorage.setItem('m_city_id', id); localStorage.setItem('m_city_name', name);
      toggleModal('cityModal'); renderHome();
    }

    window.addEventListener('DOMContentLoaded', renderHome);
  </script>
</body>
</html>
